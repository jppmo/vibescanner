[project]
name = "vibescan-scanner"
version = "0.1.0"
description = "Core scan engine for Vibescan"
requires-python = ">=3.12"
dependencies = [
    "tree-sitter>=0.21.0",
    "tree-sitter-javascript>=0.21.0",
    "tree-sitter-typescript>=0.21.0",
    "tree-sitter-python>=0.21.0",
    "redis[hiredis]>=5.0.0",
    "httpx>=0.27.0",
    "pytest-cov>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vibescan"]
