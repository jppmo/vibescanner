[project]
name = "vibescan-scanner"
version = "0.1.1"
description = "Security scanner for AI-generated code"
requires-python = ">=3.12"
dependencies = [
    "tree-sitter>=0.21.0",
    "tree-sitter-javascript>=0.21.0",
    "tree-sitter-typescript>=0.21.0",
    "tree-sitter-python>=0.21.0",
    "redis[hiredis]>=5.0.0",
    "httpx>=0.27.0",
    "click>=8.1.0",
    "rich>=13.0.0",
]

[project.scripts]
vibescan = "vibescan.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vibescan"]
