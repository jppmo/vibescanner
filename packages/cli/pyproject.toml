[project]
name = "vibescan"
version = "0.1.0"
description = "Security scanner for AI-generated code"
requires-python = ">=3.12"
dependencies = [
    "vibescan-scanner",
    "click>=8.1.0",
    "rich>=13.0.0",
]

[project.scripts]
vibescan = "vibescan_cli.main:cli"

[tool.uv.sources]
vibescan-scanner = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vibescan_cli"]
