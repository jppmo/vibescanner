[tool.uv.workspace]
members = ["packages/scanner"]


[dependency-groups]
dev = [
    "ruff>=0.9",
    "pytest>=8",
    "pytest-cov>=6",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D100",    # missing docstring in public module
    "D104",    # missing docstring in public package
    "D105",    # missing docstring in magic method
    "D107",    # missing docstring in __init__
    "D102",    # missing docstring in public method — CLAUDE.md discourages boilerplate docs
    "ERA001",  # allow commented-out code
    "FIX002",  # line contains FIXME
    "TD002",   # missing TODO author
    "TD003",   # missing TODO issue link
    "COM812",  # trailing comma (conflicts with ruff formatter)
    "ISC001",  # implicit string concat (conflicts with ruff formatter)
    "E501",    # line too long — fix strings are intentionally verbose
    "PLR2004", # magic value comparison — thresholds and scores are self-documenting
    "ANN001",  # missing type annotation for function argument — internal helpers exempt
    "ANN202",  # missing return type for private function — internal helpers exempt
    "BLE001",  # blind except — intentional in I/O and network error boundaries
    "ARG002",  # unused method argument — tree param is required by BaseRule interface
    "C901",    # complex structure — rule logic inherently branches
    "PLC0415", # import not at top level — lazy imports for CLI startup performance
    "RUF002",  # ambiguous unicode in docstring — em-dash is intentional
    "PLR0911", # too many return statements — rule guard clauses are clearer this way
    "S608",    # hardcoded SQL — false positive on fix-string text, not actual queries
    "SLF001",  # private member access — engine accesses its own sub-objects' private state
    "S607",    # partial executable path — calling `git` by name is standard
    "PLR0913", # too many arguments — formatter.write and CLI scan have legitimate fan-out
    "PLR0912", # too many branches — rule logic with diff-aware filtering branches naturally
    "TRY003",  # long exception messages — DiffError messages need context to be actionable
    "EM102",   # f-string in exception — local-only msg= variables don't need this discipline
    "PERF401", # use list.extend — for loops are clearer when each iteration has side effects
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["vibescan"]

[tool.pytest.ini_options]
testpaths = ["packages/scanner/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -v"

[tool.coverage.run]
source = ["packages/scanner/vibescan"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
