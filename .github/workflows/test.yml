name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run linter
        run: uv run ruff check packages/scanner/vibescan packages/cli/vibescan_cli

      - name: Run tests
        run: uv run pytest packages/scanner/tests/ -v --tb=short --cov=packages/scanner/vibescan --cov-report=term-missing

      - name: Self-scan (dogfood)
        run: uv run vibescan scan . --fail-on CRITICAL
